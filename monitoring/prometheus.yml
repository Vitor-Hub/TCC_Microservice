global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

  external_labels:
    monitor: 'tcc-comparison'
    environment: 'development'

scrape_configs:

  # ============================================================
  # MICROSERVICES — individual Spring Boot actuator endpoints
  # Scraped via host.docker.internal so Prometheus container can
  # reach services running in the mstcc-net Docker network whose
  # ports are published to the host.
  # ============================================================

  - job_name: 'microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:18081'
          - 'host.docker.internal:18082'
          - 'host.docker.internal:18083'
          - 'host.docker.internal:18084'
          - 'host.docker.internal:18085'
          - 'host.docker.internal:18765'
        labels:
          stack: 'microservices'

  # ============================================================
  # MONOLITH — single Spring Boot application
  # ============================================================

  - job_name: 'monolith'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'
        labels:
          stack: 'monolith'
          service: 'monolith'

  # ============================================================
  # PROMETHEUS self-monitoring
  # ============================================================

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          tier: 'monitoring'
