name: mstcc-mono

services:
  monolith:
    container_name: mono_app
    build: .
    ports:
      - "8080:8080"
    depends_on:
      mono_db:
        condition: service_healthy
    networks:
      - mono-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://mono_db:5432/monolith_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JAVA_OPTS: -Xmx768m -Xms384m -XX:+UseG1GC
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 384M

  mono_db:
    image: postgres:15-alpine
    container_name: mono_db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: monolith_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - mono_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monolith_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mono-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  mono_db_data:
    driver: local

networks:
  mono-net:
    name: mono-net
    driver: bridge
